{% extends "base.html" %}
{% block title %}Sign in — LogOcean{% endblock %}
{% block body %}
<h1>Sign in</h1>
{% if error %}<div class="alert err">{{ error }}</div>{% endif %}
<form method="post" action="/login" class="panel"
      style="max-width: 360px; flex-direction: column; align-items: stretch;">
  <label>Username <input type="text" name="username" autofocus required></label>
  <label>Password <input type="password" name="password" required></label>
  <button type="submit" class="btn primary">Sign in</button>
</form>
{% endblock %}
