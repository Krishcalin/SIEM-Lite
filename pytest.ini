[pytest]
# Unit tests are DB-free and run everywhere. Integration tests need a live
# PostgreSQL and are marked `integration` — they self-skip when DB_DSN is unset
# (so `pytest` stays green locally) and run in the dedicated CI job that provides
# a Postgres service. Run only one set with:
#   pytest -m "not integration"   # fast, no database
#   pytest -m integration         # requires DB_DSN
markers =
    integration: requires a live PostgreSQL (set DB_DSN); see tests/conftest.py
filterwarnings =
    ignore::DeprecationWarning
