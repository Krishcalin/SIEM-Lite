services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: logvault
      POSTGRES_PASSWORD: logvault
      POSTGRES_DB: logvault
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DB_DSN: postgresql://logvault:logvault@db:5432/logvault
      RETENTION_YEARS: "3"
      PAGE_SIZE: "100"
      MAX_UPLOAD_MB: "512"
      AUTO_PURGE: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
