services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: logocean
      POSTGRES_PASSWORD: logocean
      POSTGRES_DB: logocean
    volumes:
      - pgdata:/var/lib/postgresql/data
    # The DB is only reached by the app over the internal compose network; it is
    # deliberately NOT published to the host. For local DB access, uncomment and
    # bind to loopback only:
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logocean"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DB_DSN: postgresql://logocean:logocean@db:5432/logocean
      RETENTION_YEARS: "3"
      PAGE_SIZE: "100"
      MAX_UPLOAD_MB: "512"
      AUTO_PURGE: "false"
      # Live syslog ingestion (off by default). Set SYSLOG_ENABLED=true to listen.
      SYSLOG_ENABLED: "false"
      SYSLOG_UDP_PORT: "5514"
      SYSLOG_TCP_PORT: "5514"
      SYSLOG_FORMAT: "auto"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
      # Syslog (only used when SYSLOG_ENABLED=true). 5514 avoids needing root;
      # map "514:5514/udp" if collectors must reach the standard port.
      - "5514:5514/udp"
      - "5514:5514/tcp"

volumes:
  pgdata:
