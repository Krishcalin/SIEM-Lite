title: LSASS Credential Dump (comsvcs / procdump / rundll32)
id: lo-sysmon-lsass-dump
description: A command line that dumps LSASS process memory - comsvcs.dll MiniDump, procdump against lsass, or rundll32 targeting lsass - i.e. OS credential theft.
level: critical
detection:
  minidump_comsvcs:
    - CommandLine|contains|all: [comsvcs.dll, MiniDump]
    - message|contains|all: [comsvcs.dll, MiniDump]
  procdump_lsass:
    - CommandLine|contains|all: [procdump, lsass]
    - message|contains|all: [procdump, lsass]
  rundll_lsass:
    - CommandLine|contains|all: [rundll32, lsass, dump]
    - message|contains|all: [rundll32, lsass, dump]
  condition: minidump_comsvcs or procdump_lsass or rundll_lsass
tags:
  - attack.t1003.001
  - attack.credential_access
falsepositives:
  - Sanctioned DFIR / memory-forensics collection.
