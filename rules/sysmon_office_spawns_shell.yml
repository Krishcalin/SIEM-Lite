title: Office / Communication App Spawning a Command Interpreter
id: lo-sysmon-office-spawns-shell
description: A productivity or communication app (Word/Excel/PowerPoint/Outlook/OneNote/Teams) spawned a command shell or script interpreter - a hallmark of malicious macros and phishing payloads.
level: high
logsource:
  vendor: microsoft
detection:
  parent:
    ParentImage|endswith:
      - \winword.exe
      - \excel.exe
      - \powerpnt.exe
      - \outlook.exe
      - \onenote.exe
      - \mspub.exe
      - \msaccess.exe
      - \visio.exe
      - \wordpad.exe
      - \teams.exe
      - \eqnedt32.exe
  child:
    Image|endswith:
      - \cmd.exe
      - \powershell.exe
      - \pwsh.exe
      - \wscript.exe
      - \cscript.exe
      - \mshta.exe
      - \regsvr32.exe
      - \rundll32.exe
      - \bitsadmin.exe
      - \certutil.exe
      - \curl.exe
  condition: parent and child
tags:
  - attack.t1566.001
  - attack.t1059
  - attack.initial_access
  - attack.execution
falsepositives:
  - Legitimate document automation / add-ins that shell out.
